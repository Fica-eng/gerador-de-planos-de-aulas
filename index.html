<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Plano de Aula</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <!-- MathJax para fórmulas LaTeX -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f4f6; min-height: 100vh; }

    /* Impressão */
    @media print {
      .noprint { display: none !important; }
      body { background: #fff; }
      #plano-imprimivel { margin: 0; }

      /* Páginas 1 e 2: landscape */
      .pagina-landscape {
        page-break-after: always;
        size: A4 landscape;
      }
      /* Página 3: portrait */
      .pagina-portrait {
        size: A4 portrait;
      }
      @page landscape { size: A4 landscape; margin: 1cm; }
      @page portrait  { size: A4 portrait;  margin: 1.5cm; }
    }

    /* Quadro Mural */
    .qm-section { margin-bottom: 18px; }
    .qm-titulo { font-size: 13pt; font-weight: bold; border-bottom: 2px solid #1a56db; padding-bottom: 3px; margin-bottom: 8px; color: #1a56db; }
    .qm-subtitulo { font-size: 11pt; font-weight: bold; margin: 10px 0 4px; }
    .qm-body { font-size: 10pt; line-height: 1.6; }
    .qm-body ul { padding-left: 20px; margin: 4px 0; }
    .qm-body ol { padding-left: 20px; margin: 4px 0; }
    .qm-body li { margin-bottom: 4px; }
    .qm-notacao { background: #f0f7ff; border-left: 4px solid #1a56db; padding: 6px 10px; margin: 6px 0; font-family: monospace; font-size: 10pt; }
    .qm-exemplo { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
    .qm-propriedades { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
    .qm-exercicios { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
    .qm-resolucao { background: #fdf4ff; border: 1px solid #d8b4fe; border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
    .qm-tpc { background: #fff1f2; border: 1px solid #fda4af; border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER_URL = "https://plano-aula-backend-production.up.railway.app/gerar";

    const initialForm = {
      escola: "", data: "", curso: "Diurno", duracao: "45",
      classe: "", turma: "", professor: "", generoProfessor: "M", disciplina: "",
      directorAdjunto: "", tema: "", unidadeTematica: "",
    };

    // Renderiza MathJax só para disciplinas exactas
    function useMathJax(dep) {
      useEffect(() => {
        const disciplinasLatex = ["matemática","matematica","física","fisica","química","quimica"];
        const usaLatex = disciplinasLatex.some(d => (plano?.disciplina||form?.disciplina||"").toLowerCase().includes(d));
        if (usaLatex && window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise();
        }
      }, [dep]);
    }

    // Componente Quadro Mural estruturado
    function QuadroMural({ qm, tema }) {
      useMathJax(qm);
      if (!qm) return null;
      return (
        <div className="qm-body">
          {/* Definição */}
          {qm.definicao && (
            <div className="qm-section">
              <div className="qm-subtitulo">Definição</div>
              <p>{qm.definicao}</p>
            </div>
          )}

          {/* Notação */}
          {qm.notacao && (
            <div className="qm-section">
              <div className="qm-notacao" dangerouslySetInnerHTML={{ __html: qm.notacao }}/>
            </div>
          )}

          {/* Exemplos */}
          {qm.exemplos && qm.exemplos.length > 0 && (
            <div className="qm-section">
              <div className="qm-subtitulo">Exemplos</div>
              <div className="qm-exemplo">
                <ol>{qm.exemplos.map((e,i)=><li key={i} dangerouslySetInnerHTML={{__html: e}}/>)}</ol>
              </div>
            </div>
          )}

          {/* Desenvolvimento / conceitos adicionais */}
          {qm.desenvolvimento && qm.desenvolvimento.length > 0 && (
            <div className="qm-section">
              {qm.desenvolvimento.map((bloco, i) => (
                <div key={i}>
                  {bloco.subtitulo && <div className="qm-subtitulo">{bloco.subtitulo}</div>}
                  {bloco.texto && <p dangerouslySetInnerHTML={{__html: bloco.texto}}/>}
                  {bloco.notacao && <div className="qm-notacao" dangerouslySetInnerHTML={{__html: bloco.notacao}}/>}
                  {bloco.exemplos && (
                    <div className="qm-exemplo">
                      <ol>{bloco.exemplos.map((e,j)=><li key={j} dangerouslySetInnerHTML={{__html: e}}/>)}</ol>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Propriedades */}
          {qm.propriedades && qm.propriedades.length > 0 && (
            <div className="qm-section">
              <div className="qm-subtitulo">Propriedades Importantes</div>
              <div className="qm-propriedades">
                <ol>{qm.propriedades.map((p,i)=><li key={i} dangerouslySetInnerHTML={{__html: p}}/>)}</ol>
              </div>
            </div>
          )}

          {/* Exercícios */}
          {qm.exercicios && qm.exercicios.length > 0 && (
            <div className="qm-section">
              <div className="qm-subtitulo">Exercícios</div>
              <div className="qm-exercicios">
                <ol>{qm.exercicios.map((e,i)=><li key={i} dangerouslySetInnerHTML={{__html: e}}/>)}</ol>
              </div>
            </div>
          )}

          {/* Resolução dos exercícios */}
          {qm.resolucaoExercicios && qm.resolucaoExercicios.length > 0 && (
            <div className="qm-section">
              <div className="qm-subtitulo">Resolução</div>
              <div className="qm-resolucao">
                <ol>{qm.resolucaoExercicios.map((r,i)=><li key={i} dangerouslySetInnerHTML={{__html: r}}/>)}</ol>
              </div>
            </div>
          )}

          {/* TPC */}
          {qm.tpc && qm.tpc.length > 0 && (
            <div className="qm-section">
              <div className="qm-subtitulo">TPC</div>
              <div className="qm-tpc">
                <ol>{qm.tpc.map((t,i)=><li key={i} dangerouslySetInnerHTML={{__html: t}}/>)}</ol>
              </div>
            </div>
          )}

          {/* Resolução do TPC */}
          {qm.resolucaoTpc && qm.resolucaoTpc.length > 0 && (
            <div className="qm-section">
              <div className="qm-subtitulo">Resolução do TPC</div>
              <div className="qm-resolucao">
                <ol>{qm.resolucaoTpc.map((r,i)=><li key={i} dangerouslySetInnerHTML={{__html: r}}/>)}</ol>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [form, setForm] = useState(initialForm);
      const [plano, setPlano] = useState(null);
      const [loading, setLoading] = useState(false);
      const [erro, setErro] = useState("");
      const [step, setStep] = useState("form");
      const [copiado, setCopiado] = useState(false);

      const handle = (e) => setForm({ ...form, [e.target.name]: e.target.value });
      const artigoDocente = form.generoProfessor === "F" ? "A Docente" : "O Docente";
      const labelProfessor = form.generoProfessor === "F" ? "👩‍🏫 Nome da Professora" : "👨‍🏫 Nome do Professor";

      const descarregarWord = () => {
        const el = document.getElementById("plano-imprimivel");
        if (!el) return;
        const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:w="urn:schemas-microsoft-com:office:word"
          xmlns="http://www.w3.org/TR/REC-html40">
          <head><meta charset="utf-8"/>
          <style>
            body{font-family:Arial,sans-serif;font-size:11pt;margin:1cm}
            h2,h3{text-align:center} table{width:100%;border-collapse:collapse;margin-bottom:10px}
            th{background:#ccc;border:1px solid #000;padding:5px;text-align:center;font-weight:bold}
            td{border:1px solid #000;padding:5px;vertical-align:top;font-size:9pt}
            .qm-subtitulo{font-weight:bold;margin:8px 0 3px;font-size:11pt}
            .qm-notacao{background:#f0f7ff;padding:5px 8px;margin:4px 0;font-family:monospace}
            .qm-exemplo{background:#f9fafb;border:1px solid #ccc;padding:6px 10px;margin:4px 0}
            .qm-propriedades{background:#fffbeb;border:1px solid #fcd34d;padding:6px 10px;margin:4px 0}
            .qm-exercicios{background:#f0fdf4;border:1px solid #86efac;padding:6px 10px;margin:4px 0}
            .qm-resolucao{background:#fdf4ff;border:1px solid #d8b4fe;padding:6px 10px;margin:4px 0}
            .qm-tpc{background:#fff1f2;border:1px solid #fda4af;padding:6px 10px;margin:4px 0}
            @page landscape{size:29.7cm 21cm;margin:1cm}
            @page portrait{size:21cm 29.7cm;margin:1.5cm}
            .pg-landscape{page:landscape}
            .pg-portrait{page:portrait}
          </style></head>
          <body>${el.innerHTML}</body></html>`;
        const blob = new Blob(["\ufeff" + html], { type: "application/msword;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Plano_${(form.tema||"aula").replace(/\s+/g,"_")}.doc`;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
      };

      const copiarHTML = () => {
        const el = document.getElementById("plano-imprimivel");
        if (!el) return;
        const blob = new Blob([`<html><body style="font-family:Arial;font-size:10pt;margin:1cm">${el.innerHTML}</body></html>`], { type: "text/html" });
        const textBlob = new Blob([el.innerText], { type: "text/plain" });
        navigator.clipboard.write([new ClipboardItem({ "text/html": blob, "text/plain": textBlob })])
          .then(() => { setCopiado(true); setTimeout(() => setCopiado(false), 3000); })
          .catch(() => {
            const range = document.createRange();
            range.selectNode(el);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand("copy");
            window.getSelection().removeAllRanges();
            setCopiado(true); setTimeout(() => setCopiado(false), 3000);
          });
      };

      const gerar = async () => {
        if (!form.tema || !form.escola || !form.professor) {
          setErro("Preencha pelo menos: Escola, Professor(a) e Tema."); return;
        }
        setErro(""); setLoading(true);

        const disciplinasLatex = ["matemática","matematica","física","fisica","química","quimica"];
        const usaLatex = disciplinasLatex.some(d => (form.disciplina||"").toLowerCase().includes(d));

        const prompt = `Cria um plano de aula completo para "${form.tema}", disciplina ${form.disciplina||"Matemática"}, ${form.classe||"8"}ª classe, ${form.duracao} minutos, contexto moçambicano (currículo INDE/MINED).

Responde SOMENTE com JSON puro sem markdown. ${usaLatex
  ? "IMPORTANTE: Esta disciplina é exactamente Matemática, Física ou Química — usa obrigatoriamente LaTeX para TODAS as fórmulas, notações e símbolos (ex: $A - B$, $x \\\\in A$, $\\\\emptyset$, $F = ma$, $H_2O$). Envolve sempre expressões matemáticas em $...$ (inline) ou $...$ (bloco)."
  : "IMPORTANTE: Esta é uma disciplina teórica — NÃO uses LaTeX. Escreve tudo em texto simples, sem símbolos matemáticos especiais."
}

Estrutura EXACTA:
{
  "objectivosCognitivos": ["...", "...", "..."],
  "objectivosPsicomotores": ["...", "..."],
  "objectivosAfectivos": ["...", "..."],
  "introducao": {
    "tempo": "5",
    "funcaoDidactica": "Introdução e Motivação",
    "conteudo": "...",
    "competencias": "...",
    "actProfessor": ["...", "...", "..."],
    "actAluno": ["...", "...", "..."],
    "metodo": "Elaboração conjunta",
    "meios": "Quadro, marcador, caderno, apagador"
  },
  "mediacao": {
    "tempo": "20",
    "funcaoDidactica": "Mediação e Assimilação",
    "conteudo": "...",
    "competencias": "...",
    "actProfessor": ["...", "...", "..."],
    "actAluno": ["...", "...", "..."],
    "metodo": "Exposição",
    "meios": "Quadro, marcador, caderno, caneta"
  },
  "dominio": {
    "tempo": "15",
    "funcaoDidactica": "Domínio e Consolidação",
    "conteudo": "...",
    "competencias": "...",
    "actProfessor": ["...", "...", "..."],
    "actAluno": ["...", "...", "..."],
    "metodo": "Elaboração conjunta",
    "meios": "Quadro, marcador, caderno, apagador"
  },
  "controle": {
    "tempo": "5",
    "funcaoDidactica": "Controle e Avaliação",
    "conteudo": "Marcação do TPC",
    "competencias": "...",
    "actProfessor": ["...", "..."],
    "actAluno": ["..."],
    "metodo": "Elaboração conjunta",
    "meios": "Quadro, marcador, caderno"
  },
  "quadroMural": {
    "definicao": "Texto completo da definição com notação LaTeX",
    "notacao": "Notação formal em LaTeX, ex: $A - B = \\{x : x \\in A \\text{ e } x \\notin B\\}$",
    "exemplos": [
      "Exemplo 1 completo com valores concretos e LaTeX",
      "Exemplo 2 completo com valores concretos e LaTeX"
    ],
    "desenvolvimento": [
      {
        "subtitulo": "Conceito adicional relacionado (ex: Complementar de um Conjunto)",
        "texto": "Explicação do conceito com LaTeX",
        "notacao": "Notação LaTeX do conceito",
        "exemplos": ["Exemplo 1", "Exemplo 2"]
      }
    ],
    "propriedades": [
      "Propriedade 1 em LaTeX",
      "Propriedade 2 em LaTeX",
      "Propriedade 3 em LaTeX"
    ],
    "exercicios": [
      "Enunciado exercício 1 completo com dados concretos",
      "Enunciado exercício 2 completo com dados concretos",
      "Enunciado exercício 3 completo com dados concretos"
    ],
    "resolucaoExercicios": [
      "Resolução 1 com LaTeX",
      "Resolução 2 com LaTeX",
      "Resolução 3 com LaTeX"
    ],
    "tpc": [
      "Enunciado TPC 1 completo",
      "Enunciado TPC 2 completo",
      "Enunciado TPC 3 completo"
    ],
    "resolucaoTpc": [
      "Resolução TPC 1 com LaTeX",
      "Resolução TPC 2 com LaTeX",
      "Resolução TPC 3 com LaTeX"
    ]
  }
}`;

        try {
          const res = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-opus-4-8", max_tokens: 8000, messages: [{ role: "user", content: prompt }] }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
          const raw = data.content.map(i => i.text||"").join("").trim();
          const start = raw.indexOf("{"), end = raw.lastIndexOf("}");
          if (start===-1||end===-1) throw new Error("Resposta inválida da IA.");
          const parsed = JSON.parse(raw.substring(start, end+1));
          parsed.disciplina = form.disciplina; // guardar disciplina no plano
          setPlano(parsed);
          setStep("preview");
        } catch(err) { setErro("Erro: " + err.message); }
        setLoading(false);
      };

      const d = form;
      const p = plano;
      const tc = { border:"1px solid #000", padding:"5px", verticalAlign:"top", fontSize:"9pt" };
      const th = { ...tc, background:"#ccc", textAlign:"center", fontWeight:"bold" };

      // ── PLANO COMPLETO ─────────────────────────────────────────────────────
      const PlanoCompleto = () => {
        useMathJax(plano);
        if (!p) return null;
        return (
          <div id="plano-imprimivel" style={{ fontFamily:"Arial,sans-serif", color:"#000" }}>

            {/* ── PÁGINA 1 LANDSCAPE: Cabeçalho + Objectivos + Assinaturas ── */}
            <div className="pg-landscape" style={{ pageBreakAfter:"always" }}>
              <h2 style={{ textAlign:"center", margin:"0 0 8px", fontSize:"13pt" }}>Plano de Aula</h2>
              <table style={{ width:"100%", borderCollapse:"collapse", marginBottom:8 }}>
                <tbody>
                  <tr>
                    <td style={tc}><b>Escola:</b> {d.escola}</td>
                    <td style={tc}><b>Data:</b> {d.data}</td>
                    <td style={tc}><b>Curso:</b> {d.curso}</td>
                  </tr>
                  <tr>
                    <td style={tc}><b>Duração:</b> {d.duracao}´</td>
                    <td style={tc}><b>Classe:</b> {d.classe}ª</td>
                    <td style={tc}><b>Turma:</b> {d.turma}</td>
                  </tr>
                  <tr>
                    <td style={tc} colSpan={2}><b>Nome {d.generoProfessor==="F"?"da Professora":"do Professor"}:</b> {d.professor}</td>
                    <td style={tc}><b>Disciplina:</b> {d.disciplina}</td>
                  </tr>
                  <tr>
                    <td style={tc} colSpan={3}><b>Unidade Temática:</b> {d.unidadeTematica||d.tema} &nbsp;|&nbsp; <b>Tema:</b> {d.tema}</td>
                  </tr>
                </tbody>
              </table>

              <b style={{ fontSize:"10pt" }}>Objectivos</b>
              <table style={{ width:"100%", borderCollapse:"collapse", margin:"4px 0 16px" }}>
                <thead><tr>
                  <th style={th}>Objectivos Cognitivos</th>
                  <th style={th}>Objectivos Psicomotores</th>
                  <th style={th}>Objectivos Afectivos</th>
                </tr></thead>
                <tbody><tr>
                  <td style={tc}>No fim da aula o aluno deve possuir conhecimentos sobre:<br/><br/>{p.objectivosCognitivos.map((o,i)=><div key={i}>✔ {o}<br/><br/></div>)}</td>
                  <td style={tc}>No fim da aula o aluno deve ser capaz de:<br/><br/>{p.objectivosPsicomotores.map((o,i)=><div key={i}>✔ {o}<br/><br/></div>)}</td>
                  <td style={tc}>No fim da aula o aluno estará convicto de que:<br/><br/>{p.objectivosAfectivos.map((o,i)=><div key={i}>✔ {o}<br/><br/></div>)}</td>
                </tr></tbody>
              </table>

              <table style={{ width:"100%", borderCollapse:"collapse", marginTop:24 }}>
                <tbody><tr>
                  <td style={{ border:"none", textAlign:"center", width:"50%", paddingTop:20 }}>
                    O Director Adjunto Pedagógico<br/><br/><br/>______________________________<br/>({d.directorAdjunto})
                  </td>
                  <td style={{ border:"none", textAlign:"center", width:"50%", paddingTop:20 }}>
                    {artigoDocente}<br/><br/><br/>______________________________<br/>({d.professor})
                  </td>
                </tr></tbody>
              </table>
            </div>

            {/* ── PÁGINA 2 LANDSCAPE: Desenvolvimento da Aula ── */}
            <div className="pg-landscape" style={{ pageBreakAfter:"always" }}>
              <h3 style={{ textAlign:"center", margin:"0 0 8px", fontSize:"12pt" }}>Desenvolvimento da Aula — {d.tema}</h3>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead><tr>
                  {["Tempo","Função Didáctica","Conteúdo","Competências","Act. do Professor","Act. do Aluno","Método","Meios de Ensino"].map(x=>(
                    <th key={x} style={th}>{x}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {[p.introducao,p.mediacao,p.dominio,p.controle].map((s,i)=>(
                    <tr key={i} style={{ background:i%2===0?"#f9f9f9":"#fff" }}>
                      <td style={{ ...tc, textAlign:"center", fontWeight:"bold" }}>{s.tempo}´</td>
                      <td style={tc}>{s.funcaoDidactica}</td>
                      <td style={tc}>{s.conteudo}</td>
                      <td style={tc}>{s.competencias}</td>
                      <td style={tc}>{s.actProfessor.map((a,j)=><div key={j}>• {a}</div>)}</td>
                      <td style={tc}>{s.actAluno.map((a,j)=><div key={j}>• {a}</div>)}</td>
                      <td style={tc}>{s.metodo}</td>
                      <td style={tc}>{s.meios}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* ── PÁGINA 3 PORTRAIT: Quadro Mural ── */}
            <div className="pg-portrait">
              <h3 style={{ textAlign:"center", margin:"0 0 6px", fontSize:"13pt" }}>Quadro Mural</h3>
              <div style={{ textAlign:"center", fontSize:"11pt", fontWeight:"bold", marginBottom:14, color:"#1a56db" }}>
                Tema: {d.tema}
              </div>
              <QuadroMural qm={p.quadroMural} tema={d.tema}/>
            </div>

          </div>
        );
      };

      // ── FORMULÁRIO ─────────────────────────────────────────────────────────
      if (step === "form") return (
        <div style={{ maxWidth:840, margin:"0 auto", padding:"20px 14px" }}>
          <div style={{ background:"linear-gradient(135deg,#1a56db,#0e3a8c)", borderRadius:10, padding:"18px 22px", marginBottom:22, color:"#fff" }}>
            <div style={{ fontSize:22, fontWeight:700 }}>📋 Gerador de Plano de Aula com IA</div>
            <div style={{ fontSize:13, opacity:.85, marginTop:4 }}>Preencha os dados e a IA gera o plano completo</div>
          </div>

          <div style={{ background:"#fff", borderRadius:10, padding:22, boxShadow:"0 2px 8px rgba(0,0,0,.08)" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              {[
                ["escola","🏫 Escola","Ex: Escola Básica de Tobuè"],
                ["data","📅 Data",""],
                ["curso","📚 Curso","Ex: Diurno"],
                ["duracao","⏱ Duração (min)","45"],
                ["classe","🎓 Classe","Ex: 8"],
                ["turma","🔤 Turma","Ex: A"],
                ["disciplina","📐 Disciplina","Ex: Matemática"],
                ["directorAdjunto","🏛 Director Adjunto Pedagógico",""],
                ["unidadeTematica","📂 Unidade Temática","Ex: Conjuntos"],
              ].map(([name,label,ph])=>(
                <div key={name}>
                  <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#444", marginBottom:3 }}>{label}</label>
                  <input name={name} type={name==="data"?"date":"text"} placeholder={ph} value={form[name]} onChange={handle}
                    style={{ width:"100%", padding:"7px 9px", border:"1px solid #ccc", borderRadius:6, fontSize:13 }}/>
                </div>
              ))}
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"auto 1fr", gap:14, marginTop:14, alignItems:"end" }}>
              <div>
                <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#444", marginBottom:3 }}>⚥ Género</label>
                <div style={{ display:"flex", gap:8 }}>
                  {[["M","♂ M"],["F","♀ F"]].map(([val,lbl])=>(
                    <label key={val} style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer",
                      padding:"7px 16px", borderRadius:6, border:`2px solid ${form.generoProfessor===val?"#1a56db":"#ccc"}`,
                      background:form.generoProfessor===val?"#eff6ff":"#fff",
                      fontWeight:form.generoProfessor===val?700:400, fontSize:13 }}>
                      <input type="radio" name="generoProfessor" value={val} checked={form.generoProfessor===val}
                        onChange={handle} style={{ display:"none" }}/>
                      {lbl}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#444", marginBottom:3 }}>{labelProfessor}</label>
                <input name="professor" placeholder={form.generoProfessor==="F"?"Nome completo da professora":"Nome completo do professor"}
                  value={form.professor} onChange={handle}
                  style={{ width:"100%", padding:"7px 9px", border:"1px solid #ccc", borderRadius:6, fontSize:13 }}/>
              </div>
            </div>

            <div style={{ marginTop:8, padding:"7px 12px", background:"#f0f7ff", borderRadius:6, fontSize:12, color:"#1a56db" }}>
              ℹ️ A assinatura aparecerá como: <b>"{artigoDocente}"</b>
            </div>

            <div style={{ marginTop:14 }}>
              <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#444", marginBottom:3 }}>✏️ Tema da Aula *</label>
              <input name="tema" placeholder="Ex: Diferença de Conjuntos, Funções Lineares, Equações do 2º Grau..."
                value={form.tema} onChange={handle}
                style={{ width:"100%", padding:"9px 11px", border:"2px solid #1a56db", borderRadius:6, fontSize:14 }}/>
            </div>

            {erro && <div style={{ marginTop:10, padding:"10px 14px", background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:6, color:"#b91c1c", fontSize:13 }}>⚠️ {erro}</div>}

            <button onClick={gerar} disabled={loading}
              style={{ marginTop:18, width:"100%", padding:13, background:loading?"#93c5fd":"#1a56db", color:"#fff", border:"none", borderRadius:8, fontSize:15, fontWeight:700, cursor:loading?"not-allowed":"pointer" }}>
              {loading ? "⏳ A gerar com IA..." : "🚀 Gerar Plano de Aula"}
            </button>
            {loading && <div style={{ marginTop:10, textAlign:"center", fontSize:13, color:"#555" }}>A IA está a criar o plano para <b>"{form.tema}"</b>. Aguarde...</div>}
          </div>
        </div>
      );

      // ── PREVIEW ────────────────────────────────────────────────────────────
      return (
        <div style={{ maxWidth:960, margin:"0 auto", padding:"16px 14px" }}>
          <style>{`@media print { .noprint { display:none!important; } body{background:#fff} }`}</style>

          <div className="noprint" style={{ background:"#f0f7ff", border:"1px solid #c3dafe", borderRadius:8, padding:"12px 16px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
            <div style={{ fontSize:13 }}><b>{d.tema}</b> — {d.escola} | {d.classe}ª {d.turma} | {d.disciplina}</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <button onClick={()=>{ setStep("form"); setPlano(null); }}
                style={{ padding:"7px 14px", background:"#fff", border:"1px solid #ccc", borderRadius:6, cursor:"pointer", fontSize:13 }}>
                ✏️ Novo Plano
              </button>
              <button onClick={descarregarWord}
                style={{ padding:"7px 14px", background:"#1a56db", color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:700 }}>
                ⬇️ Word
              </button>
              <button onClick={copiarHTML}
                style={{ padding:"7px 14px", background:"#16a34a", color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:700 }}>
                📋 Copiar
              </button>
              <button onClick={()=>window.print()}
                style={{ padding:"7px 14px", background:"#7c3aed", color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:700 }}>
                🖨️ Imprimir/PDF
              </button>
            </div>
          </div>

          {copiado && (
            <div style={{ background:"#dcfce7", border:"1px solid #86efac", borderRadius:8, padding:"10px 14px", marginBottom:12, fontSize:13, color:"#166534", fontWeight:600 }}>
              ✅ Copiado! Abra o Word → Ctrl+V
            </div>
          )}

          <div style={{ background:"#fff", padding:"24px", borderRadius:10, boxShadow:"0 2px 8px rgba(0,0,0,.07)" }}>
            <PlanoCompleto />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
